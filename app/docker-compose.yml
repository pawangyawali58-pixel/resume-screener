version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: screener-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: screenerdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: screener-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: screenerdb
      DB_USER: root
      DB_PASS: password
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
